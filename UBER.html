<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consent, Uncomplicated — Case Study | Uber DPDP Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --orange:#0A0A0A; --orange-dark:#000000; --orange-tint:#F0F0F0;
  --ink:#0A0A0A; --ink-soft:#3D3D3D; --muted:#767676;
  --line:#E4E4E4; --bg:#F6F6F6; --card:#FFFFFF;
  --green:#06C167; --green-tint:#E3F9EE;
  --blue:#276EF1; --blue-tint:#E9F0FE;
  --purple:#3D3D3D; --purple-tint:#F0F0F0;
  --radius:16px; --radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 8px 24px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
  --shadow-lg:0 24px 56px rgba(0,0,0,.20);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Inter',sans-serif; font-weight:800; margin:0; letter-spacing:-0.02em;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--orange-tint); color:var(--orange-dark);}
:focus-visible{outline:2.5px solid var(--orange); outline-offset:2px; border-radius:4px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; transition-duration:.001ms !important;} }

/* ---------- layout shell ---------- */
.app{display:flex; min-height:100vh;}
.sidebar{
  width:264px; flex-shrink:0; background:var(--card); border-right:1px solid var(--line);
  position:fixed; top:0; left:0; bottom:0; display:flex; flex-direction:column; z-index:100;
  transition:transform .25s ease;
}
.sidebar .brand{padding:24px 22px 18px; border-bottom:1px solid var(--line);}
.sidebar .brand .logo{display:flex; align-items:center; gap:10px;}
.sidebar .brand .logo-mark{width:36px; height:36px; border-radius:10px; background:var(--orange); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; flex-shrink:0;}
.sidebar .brand h1{font-size:15px; font-weight:700; line-height:1.25;}
.sidebar .brand p{font-size:11px; color:var(--muted); margin-top:2px;}
.navlist{flex:1; overflow-y:auto; padding:14px 12px;}
.navitem{
  display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px; font-size:13.5px; font-weight:600;
  color:var(--ink-soft); cursor:pointer; margin-bottom:2px; transition:background .12s ease, color .12s ease; border:none; background:none; width:100%; text-align:left;
}
.navitem:hover{background:var(--bg);}
.navitem.active{background:var(--orange-tint); color:var(--orange-dark);}
.navitem .ic{width:18px; height:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
.sidebar-footer{padding:16px 20px; border-top:1px solid var(--line);}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:11px 18px; border-radius:10px;
  font-weight:700; font-size:13.5px; border:none; transition:transform .08s ease, box-shadow .15s ease, background .15s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--orange); color:#fff; box-shadow:var(--shadow-sm);}
.btn-primary:hover{background:var(--orange-dark); box-shadow:var(--shadow-md);}
.btn-outline{background:#fff; color:var(--ink); border:1.5px solid var(--line);}
.btn-outline:hover{border-color:var(--orange); color:var(--orange-dark);}
.btn-block{width:100%;}
.btn-sm{padding:8px 14px; font-size:12.5px;}

.main{flex:1; margin-left:264px; min-height:100vh; display:flex; flex-direction:column;}
.topbar{
  position:sticky; top:0; z-index:50; background:rgba(247,248,250,.85); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line); padding:14px 32px; display:flex; align-items:center; gap:16px;
}
.searchbox{
  flex:1; max-width:440px; display:flex; align-items:center; gap:9px; background:#fff; border:1.5px solid var(--line);
  border-radius:10px; padding:9px 14px; box-shadow:var(--shadow-sm);
}
.searchbox input{border:none; outline:none; font-size:13.5px; width:100%; font-family:inherit; background:transparent;}
.searchbox svg{flex-shrink:0; color:var(--muted);}
#searchResults{
  position:absolute; top:56px; left:32px; width:440px; background:#fff; border:1px solid var(--line); border-radius:12px;
  box-shadow:var(--shadow-lg); max-height:360px; overflow-y:auto; z-index:60; display:none;
}
#searchResults .res{padding:12px 16px; border-bottom:1px solid var(--line); cursor:pointer;}
#searchResults .res:hover{background:var(--orange-tint);}
#searchResults .res .rt{font-size:13px; font-weight:700;}
#searchResults .res .rs{font-size:11.5px; color:var(--muted); margin-top:2px;}
mark{background:#CFF5E0; color:#04844A; border-radius:2px;}

.content{flex:1; padding:36px 40px 80px; max-width:1180px; width:100%; margin:0 auto;}
.section{display:none; animation:fadeIn .3s ease;}
.section.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

.pill{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; padding:5px 11px; border-radius:20px;}
.pill-orange{background:var(--green-tint); color:#04844A;}
.pill-blue{background:var(--blue-tint); color:var(--blue);}
.pill-green{background:var(--green-tint); color:var(--green);}
.pill-purple{background:var(--purple-tint); color:var(--purple);}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); transition:box-shadow .15s ease, transform .15s ease;}
.card.hoverable:hover{box-shadow:var(--shadow-md); transform:translateY(-2px);}
.grid{display:grid; gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media (max-width:900px){ .grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr;} }
@media (max-width:640px){ .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;} }

.section-head{margin-bottom:24px;}
.section-head .eyebrow{font-size:11.5px; font-weight:800; color:#04844A; letter-spacing:1.5px; text-transform:uppercase;}
.section-head h2{font-size:28px; font-weight:800; margin-top:8px;}
.section-head p{font-size:14.5px; color:var(--muted); margin-top:8px; max-width:640px; line-height:1.55;}

/* skeleton */
.skeleton{background:linear-gradient(90deg,#EDEEF2 25%,#F5F6F8 37%,#EDEEF2 63%); background-size:400% 100%; animation:shimmer 1.3s ease infinite; border-radius:8px;}
@keyframes shimmer{0%{background-position:100% 50%;} 100%{background-position:0 50%;}}

/* mobile bottom nav */
.bottomnav{display:none;}
@media (max-width:860px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0); box-shadow:var(--shadow-lg);}
  .main{margin-left:0;}
  .bottomnav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    z-index:90; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .bottomnav .bnitem{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:7px 2px; font-size:9.5px; font-weight:700; color:var(--muted); border:none; background:none;}
  .bottomnav .bnitem.active{color:var(--orange-dark);}
  .content{padding-bottom:96px;}
  .menubtn{display:flex !important;}
}
.menubtn{display:none; width:38px; height:38px; border-radius:9px; border:1.5px solid var(--line); background:#fff; align-items:center; justify-content:center; flex-shrink:0;}
.overlay{display:none; position:fixed; inset:0; background:rgba(20,20,30,.4); z-index:95;}
.overlay.show{display:block;}

/* ---- Home hero ---- */
.hero{background:linear-gradient(135deg,#1A1D24 0%,#2B2F3A 100%); border-radius:24px; padding:44px 40px; color:#fff; position:relative; overflow:hidden;}
.hero::after{content:''; position:absolute; top:-60px; right:-60px; width:280px; height:280px; border-radius:50%; background:radial-gradient(circle,rgba(6,193,103,.28),transparent 70%);}
.hero .badges{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.hero .badge{font-size:11px; font-weight:700; padding:5px 12px; border-radius:20px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);}
.hero h1{font-size:38px; font-weight:800; max-width:640px; line-height:1.15;}
.hero p.sub{font-size:15.5px; color:#C7CAD3; margin-top:14px; max-width:600px; line-height:1.6;}
.hero .cta-row{display:flex; gap:10px; margin-top:26px; flex-wrap:wrap; position:relative; z-index:2;}
.hero .btn-outline{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.25); color:#fff;}
.hero .btn-outline:hover{background:rgba(255,255,255,.16); color:#fff;}

.metric-card{padding:18px; text-align:left;}
.metric-card .val{font-size:26px; font-weight:800; color:var(--ink);}
.metric-card .lbl{font-size:12px; color:var(--muted); margin-top:3px; font-weight:600;}

.metabar{display:flex; gap:0; margin-top:22px; border:1px solid var(--line); border-radius:14px; overflow:hidden; background:#fff;}
.metabar > div{flex:1; padding:14px 18px; border-right:1px solid var(--line);}
.metabar > div:last-child{border-right:none;}
.metabar .k{font-size:10.5px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
.metabar .v{font-size:13.5px; font-weight:700; margin-top:3px;}
@media (max-width:700px){ .metabar{flex-wrap:wrap;} .metabar>div{flex:1 1 50%; border-bottom:1px solid var(--line);} }

/* ---- deck viewer ---- */
.deck-stage{background:#15161B; border-radius:20px; padding:36px; min-height:420px; position:relative; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; justify-content:center;}
.deck-slide{display:none; color:#fff; animation:fadeIn .25s ease;}
.deck-slide.active{display:block;}
.deck-slide .tag{font-size:10.5px; font-weight:800; color:var(--green); letter-spacing:2px; text-transform:uppercase;}
.deck-slide h3{font-size:26px; margin-top:10px; font-weight:700;}
.deck-slide ul{margin-top:18px; padding-left:0; list-style:none;}
.deck-slide li{font-size:14px; color:#D4D6DC; padding:9px 0 9px 22px; position:relative; border-bottom:1px solid rgba(255,255,255,.08); line-height:1.5;}
.deck-slide li::before{content:'→'; position:absolute; left:0; color:var(--green);}
.deck-controls{display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:14px;}
.deck-dots{display:flex; gap:6px;}
.deck-dot{width:8px; height:8px; border-radius:50%; background:var(--line); border:none; cursor:pointer; transition:all .15s ease;}
.deck-dot.active{background:var(--green); width:22px; border-radius:5px;}
.progress-track{height:4px; background:var(--line); border-radius:4px; overflow:hidden; margin-top:16px;}
.progress-fill{height:100%; background:var(--green); border-radius:4px; transition:width .25s ease;}
.speaker-notes{margin-top:16px; background:var(--orange-tint); border-radius:12px; padding:16px 18px; font-size:13px; color:var(--ink-soft); line-height:1.6; display:none;}
.speaker-notes.show{display:block;}

/* ---- doc reader ---- */
.doc-layout{display:grid; grid-template-columns:260px 1fr; gap:24px;}
@media (max-width:860px){ .doc-layout{grid-template-columns:1fr;} }
.doc-toc{position:sticky; top:80px; align-self:start; background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; max-height:70vh; overflow-y:auto;}
.doc-toc .toc-item{display:block; padding:8px 10px; border-radius:8px; font-size:12.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; margin-bottom:1px;}
.doc-toc .toc-item:hover{background:var(--bg);}
.doc-toc .toc-item.active{background:var(--orange-tint); color:var(--orange-dark);}
.doc-chapter{background:#fff; border:1px solid var(--line); border-radius:16px; margin-bottom:14px; overflow:hidden;}
.doc-chapter-head{padding:18px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer;}
.doc-chapter-head h4{font-size:15.5px; font-weight:700;}
.doc-chapter-head .chev{transition:transform .2s ease; color:var(--muted);}
.doc-chapter.open .chev{transform:rotate(180deg);}
.doc-chapter-body{max-height:0; overflow:hidden; transition:max-height .3s ease; padding:0 20px;}
.doc-chapter.open .doc-chapter-body{max-height:2000px; padding:0 20px 20px;}
.doc-chapter-body p{font-size:13.5px; color:var(--ink-soft); line-height:1.7; margin:0 0 12px;}
.doc-chapter-body table{width:100%; border-collapse:collapse; font-size:12.5px; margin:10px 0 16px;}
.doc-chapter-body th{background:var(--ink); color:#fff; text-align:left; padding:8px 10px; font-weight:700;}
.doc-chapter-body td{padding:8px 10px; border-bottom:1px solid var(--line); color:var(--ink-soft);}
.doc-chapter-body tr:nth-child(even) td{background:#FAFAFB;}

/* ---- architecture ---- */
.arch-diagram{background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px; overflow-x:auto;}
.arch-node{
  display:inline-flex; flex-direction:column; align-items:flex-start; gap:2px; padding:14px 18px; border-radius:12px;
  border:1.5px solid var(--line); background:#fff; cursor:pointer; transition:all .15s ease; min-width:170px; box-shadow:var(--shadow-sm);
}
.arch-node:hover{border-color:var(--orange); box-shadow:var(--shadow-md); transform:translateY(-2px);}
.arch-node.active{border-color:var(--orange); background:var(--orange-tint);}
.arch-node .an-title{font-size:13px; font-weight:700;}
.arch-node .an-sub{font-size:10.5px; color:var(--muted);}
.arch-row{display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px; align-items:center;}
.arch-detail{background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; margin-top:16px; display:none;}
.arch-detail.show{display:block; animation:fadeIn .25s ease;}
.arch-detail dt{font-size:11px; font-weight:800; color:var(--orange-dark); text-transform:uppercase; letter-spacing:.5px; margin-top:14px;}
.arch-detail dt:first-child{margin-top:0;}
.arch-detail dd{margin:5px 0 0; font-size:13.5px; color:var(--ink-soft); line-height:1.6;}

/* ---- analytics ---- */
.chart-card{background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px;}
.chart-card h4{font-size:13.5px; font-weight:700; margin-bottom:14px;}

/* ---- prototype embed ---- */
.proto-toolbar{display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.device-btn{padding:8px 14px; border-radius:9px; border:1.5px solid var(--line); background:#fff; font-size:12.5px; font-weight:700; color:var(--ink-soft); white-space:nowrap;}
.device-btn.active{border-color:var(--orange); color:var(--orange-dark); background:var(--orange-tint);}
.proto-frame-wrap{
  background:#EDEEF2; border-radius:20px; padding:30px; display:flex; justify-content:center;
  transition:padding .2s ease; overflow-x:auto; width:100%;
}
#protoFrame{
  border:none; border-radius:14px; box-shadow:var(--shadow-lg); background:#fff;
  transition:width .25s ease, height .25s ease; max-width:100%; flex-shrink:0;
}
@media (max-width:860px){
  .proto-frame-wrap{ padding:16px 8px; border-radius:14px; }
  #protoFrame{ width:100% !important; max-width:390px; }
}
@media (max-width:480px){
  .proto-toolbar{ gap:6px; }
  .device-btn{ padding:7px 10px; font-size:11.5px; flex:1 1 auto; text-align:center; }
  .proto-frame-wrap{ padding:10px 4px; }
  #protoFrame{ height:640px !important; }
}

/* ---- downloads ---- */
.dl-card{padding:22px; display:flex; flex-direction:column; gap:12px;}
.dl-icon{width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; color:#fff;}
.dl-meta{display:flex; gap:14px; font-size:11.5px; color:var(--muted); margin-top:2px;}
.dl-actions{display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;}

footer.credit{text-align:center; padding:30px; font-size:11.5px; color:var(--muted);}

.toast{position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; padding:13px 18px; border-radius:10px; font-size:13px; font-weight:600; box-shadow:var(--shadow-lg); z-index:200; display:flex; align-items:center; gap:9px; animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;}}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo"><div class="logo-mark">C</div><div><h1>Consent, Uncomplicated</h1><p>Uber × DPDP Act 2023 case study</p></div></div>
    </div>
    <nav class="navlist" id="navlist"></nav>
    <div class="sidebar-footer">
      <button class="btn btn-primary btn-block" onclick="go('downloads')">⬇ Download All</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menubtn" onclick="openSidebar()">☰</button>
      <div class="searchbox" style="position:relative;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" placeholder="Search the whole case study…" oninput="doSearch(this.value)" onfocus="doSearch(this.value)">
      </div>
      <div id="searchResults"></div>
      <div style="flex:1"></div>
      <button class="btn btn-outline btn-sm" onclick="go('prototype')">Open Prototype</button>
    </div>

    <div class="content" id="content"></div>
    <footer class="credit">Consent, Uncomplicated — Product case study for Vedantu PM Internship · Built as a single self-contained HTML file, all source deliverables embedded.</footer>
  </div>
</div>

<div class="bottomnav" id="bottomnav"></div>

function b64ToBytes(b64){
  const binStr = atob(b64);
  const bytes = new Uint8Array(binStr.length);
  for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
  return bytes;
}
const _blobUrlCache = {};
function getBlobUrl(key){
  if (_blobUrlCache[key]) return _blobUrlCache[key];
  const f = FILES[key];
  const blob = new Blob([b64ToBytes(f.b64)], { type: f.mime });
  const url = URL.createObjectURL(blob);
  _blobUrlCache[key] = url;
  return url;
}
let _protoHtmlCache = null;
function getProtoHtml(){
  if (_protoHtmlCache) return _protoHtmlCache;
  const bytes = b64ToBytes(FILES.proto.b64);
  _protoHtmlCache = new TextDecoder('utf-8').decode(bytes);
  return _protoHtmlCache;
}
function dataUri(key){ return getBlobUrl(key); }
function download(key){
  const f = FILES[key];
  const a = document.createElement('a');
  a.href = dataUri(key); a.download = f.name; document.body.appendChild(a); a.click(); a.remove();
  toast(`Downloading ${f.name}`);
}
function openNewTab(key){ window.open(dataUri(key), '_blank'); }
function toast(msg){
  const t = document.createElement('div'); t.className='toast'; t.innerHTML = `✓ ${msg}`;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}

function go(id){
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-'+id));

  document.getElementById('searchResults').style.display = 'none';
}

    <tr><td>Data Minimisation</td><td>Contacts & background location requested upfront</td><td>Contextual, just-in-time permission prompts</td></tr>
    <tr><td>Right to Erasure</td><td>Buried 5+ taps deep, support-dependent</td><td>Self-serve Delete My Data with 30-day scheduled deletion</td></tr>
    </table>
    <p><b>Opportunity ranking (RICE).</b> Consent & Data Rights Hub scored 4.50 — highest of 10 candidates — not because it's the single most legally urgent item, but because it closes Notice, Consent, Withdrawal, and Access/Correction/Erasure through one shared surface without touching core booking logic.</p>` },
  { title:"Part 2 — User Research", read:"7 min", content: `
    <p><b>Personas.</b> Primary — Ananya Rao (27, marketing exec, moderately privacy-aware, time-poor). Secondary — Rohan Mehta (21, student, price-sensitive, low privacy literacy). Accessibility — Meera Iyer (45, screen-reader user). Edge — Priya Nair (parent booking rides for her teenager, direct face of the Children's Data gap).</p>
    <p><b>Key theme.</b> "I assume it's already too late" — riders don't check privacy settings because they assume nothing they do will meaningfully change what's collected, a rational response to a system that has never made control visible.</p>
    <p><b>Journey shift.</b> Current trust score bottoms at 2/10 when a rider tries and fails to find self-serve controls. Future-state journey recovers to 9/10 at the same moment once withdrawal mirrors the grant flow exactly.</p>` },
  { title:"Part 3 — Product Requirements Document", read:"10 min", content: `
    <p><b>Seven Phase-1 features</b>, each with full acceptance criteria, analytics events, and engineering notes: Layered Consent Notice, Consent Dashboard, 1-Tap Withdrawal, Download My Data, Delete My Data/Account, Consent History Log, and Contextual Location Permission.</p>
    <p><b>Example — Delete My Data / Account.</b> Given a rider confirms deletion, the account is scheduled for permanent deletion within 30 days; consent records are retained 6 months as legal proof, then purged — disclosed explicitly at confirmation, not buried in policy.</p>

  { title:"Part 4 — System Design", read:"8 min", content: `
    <p><b>Architecture.</b> A new bounded context — Consent & Privacy — sits alongside existing Ride/Payments/User services, communicating via an event bus rather than direct coupling, so downstream consumers (marketing, analytics, a future Consent Manager integration) can subscribe without Consent Service needing to know they exist.</p>
    <p><b>Core services:</b> Consent Service (source of truth for purpose state), Audit Log Service (immutable ledger), Data Export Service (async, queued), Data Deletion Service (per-service purge tracking), Grievance Service.</p>

function buildDownloads(){
  const cards = [

    { key:'doc', color:'#3D3D3D', label:'DOCX', title:'Implementation Guide (Parts 1–5)', desc:'58 pages — Product Strategy, User Research, PRD, System Design, Analytics.' },
    { key:'proto', color:'#06C167', label:'HTML', title:'Interactive Prototype', desc:'Single-file clickable prototype, opens standalone in any browser.' },
  ];
  return `
  <div class="section-head">
    <div class="eyebrow">Download Center</div>
    <h2>Every deliverable, self-contained</h2>

  </div>
  <div class="grid grid-3">
    ${cards.map(c => `
    <div class="card dl-card">
      <div class="dl-icon" style="background:${c.color};">${c.label}</div>

/* =========================================================
   INTERACTIVE BEHAVIOUR
   ========================================================= */
let deckIdx = 0;
function renderDeck(){
  document.getElementById('deckSlides').innerHTML = DECK_SLIDES.map((s,i)=>`
    <div class="deck-slide ${i===deckIdx?'active':''}">
      <div class="tag">${s.tag}</div><h3>${s.title}</h3>
      <ul>${s.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
    </div>`).join('');
  document.getElementById('deckDots').innerHTML = DECK_SLIDES.map((_,i)=>`<button class="deck-dot ${i===deckIdx?'active':''}" onclick="deckGo(${i})"></button>`).join('');
  document.getElementById('deckProgress').style.width = ((deckIdx+1)/DECK_SLIDES.length*100)+'%';
  document.getElementById('deckPos').textContent = deckIdx+1;
  const notes = document.getElementById('speakerNotes');
  notes.innerHTML = `<b>Speaker notes:</b> ${DECK_SLIDES[deckIdx].bullets[0]}`;
  document.getElementById('deckThumbs').innerHTML = DECK_SLIDES.map((s,i)=>`
    <div class="card hoverable" style="padding:14px; cursor:pointer; ${i===deckIdx?'border-color:var(--orange);':''}" onclick="deckGo(${i})">
      <span class="pill pill-orange" style="font-size:9.5px;">Slide ${i+1}</span>
      <h4 style="font-size:13px; margin-top:8px;">${s.title}</h4>
    </div>`).join('');
}
function deckNext(){ deckIdx = (deckIdx+1) % DECK_SLIDES.length; renderDeck(); }
function deckPrev(){ deckIdx = (deckIdx-1+DECK_SLIDES.length) % DECK_SLIDES.length; renderDeck(); }
function deckGo(i){ deckIdx = i; renderDeck(); }
function toggleNotes(){ document.getElementById('speakerNotes').classList.toggle('show'); }
function deckFullscreen(){ document.querySelector('.deck-stage').requestFullscreen?.(); }

function renderDocs(){
  document.getElementById('docToc').innerHTML = DOC_CHAPTERS.map((c,i)=>`<div class="toc-item ${i===0?'active':''}" onclick="scrollChapter(${i})">${c.title}</div>`).join('');
  document.getElementById('docChapters').innerHTML = DOC_CHAPTERS.map((c,i)=>`
    <div class="doc-chapter ${i===0?'open':''}" id="chapter-${i}">
      <div class="doc-chapter-head" onclick="toggleChapter(${i})">
        <div><h4>${c.title}</h4><span style="font-size:11px; color:var(--muted);">⏱ ${c.read} read</span></div>
        <span class="chev">▾</span>
      </div>
      <div class="doc-chapter-body">${c.content}</div>
    </div>`).join('');
}
function toggleChapter(i){ document.getElementById('chapter-'+i).classList.toggle('open'); }
function scrollChapter(i){
  document.querySelectorAll('.toc-item').forEach((t,ti)=>t.classList.toggle('active', ti===i));
  const el = document.getElementById('chapter-'+i); el.classList.add('open');
  el.scrollIntoView?.({behavior:'smooth', block:'start'});
}
function filterDocs(q){
  q = q.toLowerCase();
  document.querySelectorAll('.doc-chapter').forEach(ch => {
    ch.style.display = ch.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

let activeArchNode = null;
function renderArch(){
  document.getElementById('archNodes').innerHTML = ARCH_NODES.map(n=>`
    <div class="arch-node" id="node-${n.id}" onclick="showArchNode('${n.id}')">
      <div class="an-title">${n.title}</div><div class="an-sub">${n.sub}</div>
    </div>`).join('');
}
function showArchNode(id){
  const n = ARCH_NODES.find(x=>x.id===id);
  document.querySelectorAll('.arch-node').forEach(el => el.classList.toggle('active', el.id === 'node-'+id));
  const d = document.getElementById('archDetail');
  d.classList.add('show');
  d.innerHTML = `
    <h3 style="font-size:19px;">${n.title}</h3>
    <dl>
      <dt>Purpose</dt><dd>${n.purpose}</dd>
      <dt>Responsibilities</dt><dd>${n.resp}</dd>
      <dt>Dependencies</dt><dd>${n.deps}</dd>
      <dt>API Connections</dt><dd>${n.api}</dd>
      <dt>Database Tables</dt><dd>${n.db}</dd>
      <dt>Events</dt><dd>${n.events}</dd>
      <dt>Technology Used</dt><dd>${n.tech}</dd>
    </dl>`;
}

function renderCharts(){
  if (window.__chartsRendered) return;
  window.__chartsRendered = true;
  const base = { responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} };
  new Chart(document.getElementById('chartTrend'), { type:'line', data:{ labels:seg.trend.labels, datasets:[{data:seg.trend.data, borderColor:'#06C167', backgroundColor:'rgba(6,193,103,.10)', fill:true, tension:.3}] }, options:base });
  new Chart(document.getElementById('chartFunnel'), { type:'bar', data:{ labels:seg.funnel.labels, datasets:[{data:seg.funnel.data, backgroundColor:'#0A0A0A', borderRadius:6}] }, options:base });
  new Chart(document.getElementById('chartCity'), { type:'bar', data:{ labels:seg.city.labels, datasets:[{data:seg.city.data, backgroundColor:'#06C167', borderRadius:6}] }, options:base });
  new Chart(document.getElementById('chartPlatform'), { type:'bar', data:{ labels:seg.platform.labels, datasets:[{data:seg.platform.data, backgroundColor:'#3D3D3D', borderRadius:6}] }, options:base });
}

function setDevice(w, btn){
  document.querySelectorAll('.device-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const f = document.getElementById('protoFrame');
  f.style.width = w+'px';
  f.style.height = w<=390 ? '780px' : w<=768 ? '640px' : '700px';
}
function resetProto(){
  const f = document.getElementById('protoFrame');
  f.srcdoc = '';
  requestAnimationFrame(() => { f.srcdoc = getProtoHtml(); });
  toast('Prototype flow reset');
}
function protoFullscreen(){ document.getElementById('protoFrame').requestFullscreen?.(); }

function copyLink(section){
  const url = location.href.split('#')[0] + '#' + section;
  navigator.clipboard?.writeText(url);
  toast('Link copied to clipboard');
}

/* =========================================================
   SEARCH
   ========================================================= */
const SEARCH_INDEX = [
  { section:'exec', label:'Executive Summary', text:'Uber India collects location contact payment behavioural data bundled consent DPDP legal exposure trust liability RICE ranking Consent Data Rights Hub' },
  { section:'deck', label:'Product Thinking Deck', text: DECK_SLIDES.map(s=>s.title+' '+s.bullets.join(' ')).join(' ') },
  { section:'docs', label:'Documentation', text: DOC_CHAPTERS.map(c=>c.title+' '+c.content).join(' ').replace(/<[^>]+>/g,' ') },
  { section:'system', label:'System Design', text:'Consent Service Audit Log Data Export Data Deletion Grievance Service API Gateway event bus consent lifecycle sequence diagram security' },
  { section:'architecture', label:'Architecture', text: ARCH_NODES.map(n=>n.title+' '+n.purpose+' '+n.resp).join(' ') },
  { section:'analytics', label:'Analytics', text:'VCCR North Star funnel consent funnel city segment platform segment A/B testing hypothesis tree root cause diagnostic' },
  { section:'prototype', label:'Interactive Prototype', text:'clickable prototype ride booking consent dashboard download delete data location permission privacy hub' },
];
function doSearch(q){
  const box = document.getElementById('searchResults');
  if (!q || q.length < 2) { box.style.display = 'none'; return; }
  const ql = q.toLowerCase();
  const hits = SEARCH_INDEX.filter(item => item.text.toLowerCase().includes(ql));
  if (!hits.length) { box.innerHTML = `<div class="res"><div class="rs">No matches for "${q}"</div></div>`; box.style.display='block'; return; }
  box.innerHTML = hits.map(h => {
    const idx = h.text.toLowerCase().indexOf(ql);
    const snippet = h.text.substring(Math.max(0,idx-40), idx+60).trim();
    const marked = snippet.replace(new RegExp(q,'ig'), m=>`<mark>${m}</mark>`);
    return `<div class="res" onclick="go('${h.section}'); document.getElementById('searchResults').style.display='none';">
      <div class="rt">${h.label}</div><div class="rs">…${marked}…</div>
    </div>`;
  }).join('');
  box.style.display = 'block';
}

}
